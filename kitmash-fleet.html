<style>
:root{--ink:#dfe6ee;--dim:#7c8696;--bay:#12161f;--line:#2a3142;
--amber:#e8a33d;--cyan:#7fd1e3;--rust:#b4502e;--bone:#d8d2c4}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:var(--bay);color:var(--ink);
font-family:'IBM Plex Mono',monospace;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none}
header{position:fixed;top:0;left:0;right:0;padding:14px 18px;
display:flex;justify-content:space-between;align-items:baseline;
pointer-events:none;z-index:3}
h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;
letter-spacing:.18em;text-transform:uppercase}
h1 small{color:var(--dim);font-weight:500;letter-spacing:.12em;display:block;
font-size:10px;margin-top:2px}
#plate{font-family:'Chakra Petch',sans-serif;font-size:12px;color:var(--dim);
letter-spacing:.2em;text-transform:uppercase}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:3;
background:linear-gradient(180deg,rgba(18,22,31,0) 0,rgba(18,22,31,.94) 26px);
padding:30px 14px 12px}
#tabs{display:flex;gap:8px;margin-bottom:8px}
.tab{flex:1;border:1px solid var(--line);background:rgba(18,22,31,.7);
color:var(--dim);font:500 11px 'Chakra Petch',sans-serif;letter-spacing:.08em;
padding:9px 6px;cursor:pointer;text-transform:uppercase;border-radius:2px}
.tab b{display:block;font-size:12px;color:var(--ink)}
.tab.on{border-color:var(--amber);color:var(--amber)}
.tab.on b{color:var(--amber)}
.tab:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
#meta{font-size:10.5px;color:var(--dim);margin-bottom:6px;min-height:14px}
#meta em{color:var(--cyan);font-style:normal}
#log{height:118px;overflow-y:auto;border-top:1px solid var(--line);
padding-top:6px;font-size:11px;line-height:1.65}
#log .ev{opacity:0;animation:tick .25s forwards}
@keyframes tick{to{opacity:1}}
@media (prefers-reduced-motion:reduce){#log .ev{animation:none;opacity:1}}
.g-commit{color:var(--ink)}.g-fail{color:var(--rust)}.g-strut{color:var(--amber)}
.g-hose{color:var(--cyan)}.g-open{color:var(--dim)}.g-adapter{color:var(--amber)}
.glyph{display:inline-block;width:1.4em;color:inherit}
@media(min-width:760px){#log{height:150px}#sheet{left:auto;width:430px;right:16px;
bottom:16px;border:1px solid var(--line);border-radius:3px;
background:rgba(18,22,31,.92);padding:14px}}

const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
const cv = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x12161f);
scene.fog = new THREE.Fog(0x12161f, 26, 60);
const cam = new THREE.PerspectiveCamera(42, 1, .1, 200);
scene.add(new THREE.HemisphereLight(0x9fb4cc, 0x1a1410, .85));
const key = new THREE.DirectionalLight(0xfff2dd, 1.1);
key.position.set(6,-4,9); scene.add(key);
const rim = new THREE.DirectionalLight(0x7fd1e3, .35);
rim.position.set(-8,6,3); scene.add(rim);
const grid = new THREE.GridHelper(80, 40, 0x2a3142, 0x1c2230);
grid.rotation.x = Math.PI/2; grid.position.z = -2.1; scene.add(grid);

function shipGroup(sh){
  const g = new THREE.Group();
  for(const m of sh.meshes){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(m.v.flat(),3));
    geo.setIndex(m.f.flat()); geo.computeVertexNormals();
    const mat = new THREE.MeshLambertMaterial({color:m.c});
    g.add(new THREE.Mesh(geo, mat));
  }
  for(const h of sh.hoses){
    let pts = h.pts.map(p=>new THREE.Vector3(...p));
    if(h.style==='catenary'){               // feral: sag the inter-part hops
      const out=[pts[0]];
      for(let i=1;i<pts.length;i++){
        if(h.kinds[i-1]!=='internal'){
          const mid=pts[i-1].clone().lerp(pts[i],.5); mid.z-=.32;
          out.push(mid);
          const clip=new THREE.Mesh(new THREE.BoxGeometry(.1,.1,.1),
            new THREE.MeshLambertMaterial({color:'#46413a'}));
          clip.position.copy(mid); g.add(clip);    // the p-clip
        }
        out.push(pts[i]);
      }
      pts=out;
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const r = h.style==='shroud' ? .085 : .05;
    const col = h.style==='shroud' ? '#8a8378' : '#e8a33d';
    g.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 48, r, 7),
          new THREE.MeshLambertMaterial({color:col})));
    if(h.style==='shroud'){                  // guild: armored conduit cladding
      g.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 12, .12, 5),
        new THREE.MeshLambertMaterial({color:'#3a4150',transparent:true,opacity:.55})));
    }
  }
  return g;
}
const groups = DATA.ships.map(sh=>{const g=shipGroup(sh);scene.add(g);return g;});

// custom orbit (no OrbitControls in r128 build)
let theta=-1.05, phi=1.18, dist=17, target=new THREE.Vector3(0,0,0), drag=null;
function setCam(){
  cam.position.set(
    target.x+dist*Math.sin(phi)*Math.cos(theta),
    target.y+dist*Math.sin(phi)*Math.sin(theta),
    target.z+dist*Math.cos(phi));
  cam.up.set(0,0,1); cam.lookAt(target);
}
cv.addEventListener('pointerdown',e=>{drag=[e.clientX,e.clientY];cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(!drag)return;
  theta-=(e.clientX-drag[0])*.006; phi-=(e.clientY-drag[1])*.006;
  phi=Math.max(.15,Math.min(2.6,phi)); drag=[e.clientX,e.clientY]});
cv.addEventListener('pointerup',()=>drag=null);
cv.addEventListener('wheel',e=>{e.preventDefault();
  dist=Math.max(6,Math.min(40,dist*(1+e.deltaY*.001)))},{passive:false});
let pinch=null;
cv.addEventListener('touchmove',e=>{if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
  if(pinch)dist=Math.max(6,Math.min(40,dist*pinch/d));
  pinch=d;}},{passive:true});
cv.addEventListener('touchend',()=>pinch=null);

const GLYPH={commit:'⊢',spine_fail:'⚠',strut:'⌐',hose:'──',port_open:'◌',
             terminate:'▣',adapter:'◍',reject:'✕',seed:'∴',budget_exhausted:'∎',
             demand_unmet:'!',route_block:'║'};
const CLS={commit:'g-commit',spine_fail:'g-fail',strut:'g-strut',hose:'g-hose',
           port_open:'g-open',terminate:'g-open',adapter:'g-adapter',
           seed:'g-open',reject:'g-open',budget_exhausted:'g-open',
           demand_unmet:'g-fail',route_block:'g-fail'};
function line(ev){
  const e=document.createElement('div');
  e.className='ev '+(CLS[ev.ev]||'g-open');
  const d={...ev}; delete d.ev;
  e.innerHTML=`<span class="glyph">${GLYPH[ev.ev]||'·'}</span>${ev.ev} ${
    Object.entries(d).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(' ')}`;
  return e;
}
const tabs=document.getElementById('tabs'),meta=document.getElementById('meta'),
      log=document.getElementById('log'),plate=document.getElementById('plate');
let cur=-1, timer=null;
function select(i){
  cur=i; timer&&clearInterval(timer);
  [...tabs.children].forEach((t,j)=>t.classList.toggle('on',j===i));
  const sh=DATA.ships[i];
  plate.textContent=sh.plate+' · '+sh.faction+' · era '+sh.era;
  const lin=sh.lineage.parent
    ? `descends from <em>${sh.lineage.parent}</em> — ${sh.lineage.mutation}`
    : `generation 0 — seed ${sh.lineage.gen_params.seed}`;
  meta.innerHTML=`${sh.stats.parts} parts · ${sh.stats.mass} kg · `+
    `${sh.stats.hoses} hose · ${lin}`;
  log.innerHTML='';
  const evs=sh.trace.filter(e=>e.ev!=='reject');
  if(rm){evs.forEach(e=>log.appendChild(line(e)));return;}
  let k=0;
  timer=setInterval(()=>{
    if(k>=evs.length){clearInterval(timer);return;}
    log.appendChild(line(evs[k++])); log.scrollTop=log.scrollHeight;
  },110);
  const c=groups[i].children[0].geometry.boundingSphere
        ||groups[i].children[0].geometry.computeBoundingSphere();
  target.y=(sh.offset?sh.offset[1]:0)*0.55;
}
DATA.ships.forEach((sh,i)=>{
  const b=document.createElement('button');
  b.className='tab';b.setAttribute('role','tab');
  const nm=sh.name.split('«');
  b.innerHTML=`<b>${nm[0].trim()}</b>«${nm[1]}`;
  b.onclick=()=>select(i); tabs.appendChild(b);
});
function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix();
}
addEventListener('resize',resize); resize(); select(1);
(function loop(){
  requestAnimationFrame(loop);
  if(!drag&&!rm)theta+=.0012;
  target.y+=0; setCam(); renderer.render(scene,cam);
})();
